<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPDH - Portal Rumah Sakit</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      /* ===== RESET ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #6db03d;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        min-height: 100vh;
      }

      /* ===== KARTU UTAMA ===== */
      .card {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 24px;
        padding: 28px 32px 24px;
        max-width: 820px;
        width: 100%;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        transition: all 0.3s ease;
      }

      /* ===== HEADER ===== */
      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
      }
      .header .logo-img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid rgba(255, 255, 255, 0.3);
        flex-shrink: 0;
      }
      .header .logo-placeholder {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: white;
        flex-shrink: 0;
      }
      .header-text h1 {
        color: white;
        font-size: 24px;
        font-weight: 700;
      }
      .header-text h1 span {
        color: #d4edc9;
      }
      .header-text p {
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-top: 2px;
      }

      /* ===== GRID TOMBOL ===== */
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      .menu-item {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 18px 10px;
        text-align: center;
        text-decoration: none;
        color: white;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .menu-item::before {
        content: "";
        position: absolute;
        top: -60%;
        left: -60%;
        width: 220%;
        height: 220%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.4s;
      }
      .menu-item:hover::before {
        opacity: 1;
      }
      .menu-item:hover {
        transform: translateY(-4px) scale(1.03);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.15);
        background: rgba(255, 255, 255, 0.16);
      }
      .menu-item:active {
        transform: scale(0.95);
      }

      .menu-item i {
        font-size: 28px;
        display: block;
        margin-bottom: 8px;
      }
      .menu-item .label {
        font-size: 13px;
        font-weight: 600;
        display: block;
        line-height: 1.3;
      }
      .menu-item .badge {
        display: inline-block;
        font-size: 9px;
        background: rgba(255, 255, 255, 0.15);
        padding: 2px 8px;
        border-radius: 20px;
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.8);
      }

      .item-erm i,
      .item-igd i,
      .item-rajal i,
      .item-lab i,
      .item-rawat-inap i,
      .item-farmasi i {
        color: #ffffff;
      }

      .full-width {
        grid-column: 1 / -1;
      }

      /* ===== FOOTER ===== */
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        flex-wrap: wrap;
        gap: 8px;
      }
      .footer .info {
        color: rgba(255, 255, 255, 0.55);
        font-size: 11px;
      }
      .footer .info i {
        margin-right: 4px;
      }
      .jam-digital {
        color: #d4edc9;
        font-size: 17px;
        font-weight: 700;
        font-family: "Courier New", monospace;
        letter-spacing: 2px;
      }

      /* ===== DESKTOP (LANDSCAPE - NO SCROLL) ===== */
      @media (min-width: 769px) {
        body {
          height: 100vh;
          overflow: hidden;
        }
        .card {
          max-height: 98vh;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }
        .grid {
          grid-template-columns: repeat(4, 1fr);
        }
        .header .logo-img,
        .header .logo-placeholder {
          width: 65px;
          height: 65px;
        }
        .header-text h1 {
          font-size: 26px;
        }
      }

      /* ===== TABLET ===== */
      @media (max-width: 768px) and (min-width: 481px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .card {
          padding: 24px;
        }
      }

      /* ===== HP PORTRAIT ===== */
      @media (max-width: 480px) {
        body {
          padding: 12px;
          align-items: flex-start;
          padding-top: 20px;
          min-height: 100vh;
          height: auto;
          overflow-y: auto;
        }
        .card {
          padding: 20px 16px 16px;
          border-radius: 20px;
        }
        .grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
        }
        .header {
          gap: 12px;
          margin-bottom: 16px;
        }
        .header .logo-img,
        .header .logo-placeholder {
          width: 48px;
          height: 48px;
        }
        .header-text h1 {
          font-size: 20px;
        }
        .header-text p {
          font-size: 11px;
        }
        .menu-item {
          padding: 14px 8px;
        }
        .menu-item i {
          font-size: 22px;
        }
        .menu-item .label {
          font-size: 11px;
        }
        .jam-digital {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- ===== HEADER DENGAN LOGO RS ===== -->
      <div class="header">
        <img
          class="logo-img"
          src="https://raw.githubusercontent.com/nhnurhabibullah007try/cpdh/main/logo_SA.png"
          alt="Logo RS"
          onerror="
            this.style.display = 'none';
            document.querySelector('.logo-placeholder').style.display = 'flex';
          "
        />
        <div class="logo-placeholder">
          <i class="fas fa-hospital"></i>
        </div>
        <div class="header-text">
          <h1>CPDH <span>Portal</span></h1>
          <p>Akses Cepat Sistem Rumah Sakit</p>
        </div>
      </div>

      <!-- ===== GRID TOMBOL ===== -->
      <div class="grid">
        <a
          href="https://erm.cpdh.web.id"
          target="_blank"
          class="menu-item item-erm"
        >
          <i class="fas fa-notes-medical"></i>
          <span class="label">Sistem ERM</span>
          <span class="badge">Rekam Medis</span>
        </a>

        <a
          href="https://dashboard-igd.cpdh.web.id"
          target="_blank"
          class="menu-item item-igd"
        >
          <i class="fas fa-tachometer-alt"></i>
          <span class="label">Dashboard IGD</span>
          <span class="badge">Real-time</span>
        </a>

        <a
          href="https://rajal.cpdh.web.id"
          target="_blank"
          class="menu-item item-rajal"
        >
          <i class="fas fa-user-md"></i>
          <span class="label">Rawat Jalan</span>
          <span class="badge">Poli</span>
        </a>

        <a
          href="https://lab.cpdh.web.id"
          target="_blank"
          class="menu-item item-lab"
        >
          <i class="fas fa-flask"></i>
          <span class="label">Laboratorium</span>
          <span class="badge">Hasil Lab</span>
        </a>

        <a
          href="https://rawatinap.cpdh.web.id"
          target="_blank"
          class="menu-item item-rawat-inap"
        >
          <i class="fas fa-procedures"></i>
          <span class="label">Rawat Inap</span>
          <span class="badge">Kamar & Pasien</span>
        </a>

        <a
          href="https://farmasi.cpdh.web.id"
          target="_blank"
          class="menu-item item-farmasi"
        >
          <i class="fas fa-pills"></i>
          <span class="label">Farmasi</span>
          <span class="badge">Obat & Stok</span>
        </a>

        <a
          href="https://link-lain.com"
          target="_blank"
          class="menu-item full-width"
          style="background: rgba(255, 255, 255, 0.06)"
        >
          <i class="fas fa-external-link-alt"></i>
          <span class="label">Aplikasi Lainnya</span>
        </a>
      </div>

      <!-- ===== FOOTER ===== -->
      <div class="footer">
        <div class="info">
          <i class="fas fa-shield-alt"></i> Terenkripsi • Internal RS
        </div>
        <div class="jam-digital" id="jamDigital">--:--:--</div>
      </div>
    </div>

    <script>
      function updateJam() {
        const now = new Date();
        const jam = String(now.getHours()).padStart(2, "0");
        const menit = String(now.getMinutes()).padStart(2, "0");
        const detik = String(now.getSeconds()).padStart(2, "0");
        document.getElementById("jamDigital").textContent =
          jam + ":" + menit + ":" + detik;
      }
      updateJam();
      setInterval(updateJam, 1000);
    </script>
  </body>
</html>
