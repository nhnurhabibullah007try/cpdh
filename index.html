<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PORTAL SACIPON</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      /* ===== RESET ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #26803a;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        min-height: 100vh;
      }
      /* ===== KARTU UTAMA — PUTIH ===== */
      .card {
        background: #ffffff;
        border-radius: 24px;
        padding: 32px 36px 28px;
        max-width: 820px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
      }
      /* ===== HEADER ===== */
      .header {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 24px;
      }
      .header .logo-img {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #6db03d;
        flex-shrink: 0;
        background: white;
      }
      .header .logo-placeholder {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: #e8f5e0;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #6db03d;
        flex-shrink: 0;
        border: 3px solid #6db03d;
      }
      .header-text h1 {
        color: #2d5a1e;
        font-size: 26px;
        font-weight: 700;
      }
      .header-text h1 span {
        color: #6db03d;
      }
      .header-text p {
        color: #6b7a63;
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-top: 2px;
      }
      /* ===== GRID TOMBOL — SERAGAM ===== */
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      .menu-item {
        background: #f0f7eb;
        border: 1px solid #dce8d4;
        border-radius: 16px;
        padding: 16px 10px;
        text-align: center;
        text-decoration: none;
        color: #2d5a1e;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        /* Tinggi seragam */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100px;
      }
      .menu-item::before {
        content: "";
        position: absolute;
        top: -60%;
        left: -60%;
        width: 220%;
        height: 220%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(109, 176, 61, 0.08) 0%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.4s;
      }
      .menu-item:hover::before {
        opacity: 1;
      }
      .menu-item:hover {
        transform: translateY(-4px) scale(1.03);
        border-color: #6db03d;
        box-shadow: 0 8px 24px rgba(109, 176, 61, 0.2);
        background: #e8f5e0;
      }
      .menu-item:active {
        transform: scale(0.95);
      }

      /* Gambar logo di dalam tombol — seragam */
      .menu-item .menu-logo {
        height: 28px;
        width: auto;
        max-width: 80%;
        display: block;
        margin: 0 auto 8px auto;
        object-fit: contain;
        flex-shrink: 0;
      }
      /* Ikon fallback jika gambar gagal */
      .menu-item .menu-icon-fallback {
        font-size: 28px;
        display: none;
        margin-bottom: 8px;
      }

      .menu-item .label {
        font-size: 13px;
        font-weight: 600;
        display: block;
        line-height: 1.3;
      }
      .menu-item .badge {
        display: inline-block;
        font-size: 9px;
        background: #dce8d4;
        padding: 2px 8px;
        border-radius: 20px;
        margin-top: 5px;
        color: #4a7a30;
      }
      .full-width {
        grid-column: 1 / -1;
        min-height: 60px;
      }
      .full-width i {
        color: #6db03d;
      }
      /* ===== FOOTER ===== */
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #e0e8db;
        flex-wrap: wrap;
        gap: 8px;
      }
      .footer .info {
        color: #8a9a82;
        font-size: 11px;
      }
      .footer .info i {
        margin-right: 4px;
      }
      .jam-digital {
        color: #6db03d;
        font-size: 17px;
        font-weight: 700;
        font-family: "Courier New", monospace;
        letter-spacing: 2px;
      }
      /* ===== DESKTOP (LANDSCAPE - NO SCROLL) ===== */
      @media (min-width: 769px) {
        body {
          height: 100vh;
          overflow: hidden;
        }
        .card {
          max-height: 98vh;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }
        .grid {
          grid-template-columns: repeat(4, 1fr);
        }
        .header .logo-img,
        .header .logo-placeholder {
          width: 70px;
          height: 70px;
        }
        .header-text h1 {
          font-size: 28px;
        }
        .menu-item {
          min-height: 110px;
        }
      }
      /* ===== TABLET ===== */
      @media (max-width: 768px) and (min-width: 481px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .card {
          padding: 24px;
        }
        .menu-item {
          min-height: 100px;
        }
      }
      /* ===== HP PORTRAIT ===== */
      @media (max-width: 480px) {
        body {
          padding: 12px;
          align-items: flex-start;
          padding-top: 20px;
          min-height: 100vh;
          height: auto;
          overflow-y: auto;
        }
        .card {
          padding: 20px 16px 16px;
          border-radius: 20px;
        }
        .grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
        }
        .header {
          gap: 12px;
          margin-bottom: 16px;
        }
        .header .logo-img,
        .header .logo-placeholder {
          width: 50px;
          height: 50px;
          font-size: 22px;
        }
        .header-text h1 {
          font-size: 20px;
        }
        .header-text p {
          font-size: 11px;
        }
        .menu-item {
          padding: 12px 8px;
          min-height: 85px;
        }
        .menu-item .menu-logo {
          height: 22px;
        }
        .menu-item .menu-icon-fallback {
          font-size: 22px;
        }
        .menu-item .label {
          font-size: 11px;
        }
        .jam-digital {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- ===== HEADER DENGAN LOGO RS ===== -->
      <div class="header">
        <img
          class="logo-img"
          src="https://raw.githubusercontent.com/nhnurhabibullah007try/cpdh/main/logo_SA.png"
          alt="Logo RS"
          onerror="
            this.style.display = 'none';
            document.querySelector('.logo-placeholder').style.display = 'flex';
          "
        />
        <div class="logo-placeholder">
          <i class="fas fa-hospital"></i>
        </div>
        <div class="header-text">
          <h1>PORTAL <span>SACIPON</span></h1>
          <p>Link Akses ke Berbagai Sistem RS</p>
        </div>
      </div>
      <!-- ===== GRID TOMBOL — SEMUA SERAGAM ===== -->
      <div class="grid">

        <!-- SMARTPLUS -->
        <a href="http://192.168.90.12/smartplus/auth/login" target="_blank" class="menu-item">
          <img class="menu-logo"
               src="https://raw.githubusercontent.com/nhnurhabibullah007try/cpdh/main/smartplus-logo-1.png"
               alt="SmartPlus"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <i class="fas fa-user-md menu-icon-fallback" style="color:#e67e22;"></i>
          <span class="label">SMARTPLUS</span>
          <span class="badge">ERM</span>
        </a>

        <!-- SARI ASIH -->
        <a href="https://www.sariasih.id/" target="_blank" class="menu-item">
          <img class="menu-logo"
               src="https://raw.githubusercontent.com/nhnurhabibullah007try/cpdh/main/logo-said.png"
               alt="SARIASIH.ID"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <i class="fas fa-user-md menu-icon-fallback" style="color:#e67e22;"></i>
          <span class="label">SARI ASIH</span>
          <span class="badge">WEB</span>
        </a>

        <!-- IGD -->
        <a href="https://db-igd.cpdh.web.id" target="_blank" class="menu-item">
          <i class="fas fa-notes-medical" style="font-size:28px; margin-bottom:8px; color:#2e86de;"></i>
          <span class="label">IGD</span>
          <span class="badge">Rekap IGD</span>
        </a>

        <!-- DASHBOARD IGD -->
        <a href="https://dashboard.cpdh.web.id/dashboard/4-dashboard-igd" target="_blank" class="menu-item">
          <i class="fas fa-tachometer-alt" style="font-size:28px; margin-bottom:8px; color:#10ac84;"></i>
          <span class="label">DASHBOARD IGD</span>
          <span class="badge">Real-time</span>
        </a>

        <!-- E-KLAIM -->
        <a href="http://192.168.90.96/E-Klaim/" target="_blank" class="menu-item">
          <img class="menu-logo"
               src="https://raw.githubusercontent.com/nhnurhabibullah007try/cpdh/main/logo_icc_1.png"
               alt="E-KLAIM"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <i class="fas fa-user-md menu-icon-fallback" style="color:#e67e22;"></i>
          <span class="label">E-KLAIM</span>
          <span class="badge">BPJS</span>
        </a>

        <!-- E-PUDING -->
        <a href="http://192.168.90.97/puding/" target="_blank" class="menu-item">
          <img class="menu-logo"
               src="https://raw.githubusercontent.com/nhnurhabibullah007try/cpdh/main/epuding-1.png"
               alt="E-PUDING"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <i class="fas fa-user-md menu-icon-fallback" style="color:#e67e22;"></i>
          <span class="label">E-PUDING</span>
          <span class="badge">CASEMIX</span>
        </a>

        <!-- ANGKET PASIEN -->
        <a href="https://sariasihgroup.com/angketpasien/" target="_blank" class="menu-item">
          <i class="fas fa-procedures" style="font-size:28px; margin-bottom:8px; color:#e84393;"></i>
          <span class="label">ANGKET PASIEN</span>
          <span class="badge">Rajal & Ranap</span>
        </a>

        <!-- GOOGLE REVIEW -->
        <a href="https://www.google.com/search?q=google+review+sari+asih+cipondoh" target="_blank" class="menu-item">
          <i class="fab fa-google" style="font-size:28px; margin-bottom:8px; color:#4285F4;"></i>
          <span class="label">Google Review</span>
          <span class="badge">Google</span>
        </a>

        <!-- FULL WIDTH -->
        <a href="https://cpdh.web.id" target="_blank" class="menu-item full-width"
           style="background:#f5faf2; border:1px dashed #6db03d;">
          <i class="fas fa-external-link-alt"></i>
          <span class="label">Aplikasi Lainnya (Menyusul)</span>
        </a>

      </div>
      <!-- ===== FOOTER ===== -->
      <div class="footer">
        <div class="info">
          <i class="fas fa-shield-alt"></i> Terenkripsi • Internal RS
        </div>
        <div class="jam-digital" id="jamDigital">--:--:--</div>
      </div>
    </div>
    <script>
      function updateJam() {
        const now = new Date();
        const jam = String(now.getHours()).padStart(2, "0");
        const menit = String(now.getMinutes()).padStart(2, "0");
        const detik = String(now.getSeconds()).padStart(2, "0");
        document.getElementById("jamDigital").textContent =
          jam + ":" + menit + ":" + detik;
      }
      updateJam();
      setInterval(updateJam, 1000);
    </script>
  </body>
</html>
