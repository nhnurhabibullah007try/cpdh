<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPDH - Portal Rumah Sakit</title>
    <!-- Font Awesome untuk ikon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      /* ----- RESET & BASE ----- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #0c1b33 0%,
          #1a3a5c 50%,
          #0d2b45 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      /* ----- KARTU UTAMA ----- */
      .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 28px;
        padding: 48px 40px 40px;
        max-width: 640px;
        width: 100%;
        box-shadow:
          0 30px 60px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transition: transform 0.3s ease;
      }
      .card:hover {
        transform: translateY(-4px);
      }

      /* ----- HEADER ----- */
      .header {
        text-align: center;
        margin-bottom: 36px;
      }
      .header .icon-hospital {
        font-size: 48px;
        color: #4fc3f7;
        background: rgba(79, 195, 247, 0.15);
        width: 80px;
        height: 80px;
        line-height: 80px;
        border-radius: 50%;
        display: inline-block;
        margin-bottom: 12px;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .header h1 {
        color: #ffffff;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .header h1 span {
        color: #4fc3f7;
      }
      .header p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        margin-top: 6px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* ----- GRID TOMBOL ----- */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 20px;
      }

      .menu-item {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        padding: 22px 16px;
        text-align: center;
        text-decoration: none;
        color: white;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }
      /* Efek glow / shine */
      .menu-item::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.5s;
      }
      .menu-item:hover::before {
        opacity: 1;
      }
      .menu-item:hover {
        transform: translateY(-6px) scale(1.03);
        border-color: rgba(255, 255, 255, 0.35);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
      }
      .menu-item:active {
        transform: scale(0.96);
      }

      .menu-item i {
        font-size: 32px;
        display: block;
        margin-bottom: 10px;
      }
      .menu-item .label {
        font-size: 14px;
        font-weight: 600;
        display: block;
      }
      .menu-item .badge {
        display: inline-block;
        font-size: 10px;
        background: rgba(255, 255, 255, 0.12);
        padding: 3px 10px;
        border-radius: 20px;
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.7);
      }

      /* Warna ikon per item */
      .item-erm i {
        color: #4fc3f7;
      }
      .item-igd i {
        color: #81c784;
      }
      .item-rajal i {
        color: #ffb74d;
      }
      .item-lab i {
        color: #ce93d8;
      }
      .item-rawat-inap i {
        color: #f06292;
      }
      .item-farmasi i {
        color: #4dd0e1;
      }

      /* ----- FULL WIDTH ----- */
      .full-width {
        grid-column: 1 / -1;
      }

      /* ----- FOOTER ----- */
      .footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .footer .info {
        color: rgba(255, 255, 255, 0.35);
        font-size: 12px;
      }
      .footer .info i {
        margin-right: 4px;
      }
      .footer .jam-digital {
        color: #4fc3f7;
        font-size: 18px;
        font-weight: 700;
        font-family: "Courier New", monospace;
        letter-spacing: 2px;
      }

      /* ----- RESPONSIVE ----- */
      @media (max-width: 480px) {
        .card {
          padding: 28px 18px;
        }
        .grid {
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        }
        .menu-item {
          padding: 16px 10px;
        }
        .menu-item i {
          font-size: 24px;
        }
        .menu-item .label {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- HEADER -->
      <div class="header">
        <div class="icon-hospital">
          <i class="fas fa-hospital"></i>
        </div>
        <h1>CPDH <span>Portal</span></h1>
        <p>Akses Cepat Sistem Rumah Sakit</p>
      </div>

      <!-- GRID TOMBOL -->
      <div class="grid">
        <a
          href="https://erm.cpdh.web.id"
          target="_blank"
          class="menu-item item-erm"
        >
          <i class="fas fa-notes-medical"></i>
          <span class="label">Sistem ERM</span>
          <span class="badge">Rekam Medis</span>
        </a>

        <a
          href="https://dashboard-igd.cpdh.web.id"
          target="_blank"
          class="menu-item item-igd"
        >
          <i class="fas fa-tachometer-alt"></i>
          <span class="label">Dashboard IGD</span>
          <span class="badge">Real-time</span>
        </a>

        <a
          href="https://rajal.cpdh.web.id"
          target="_blank"
          class="menu-item item-rajal"
        >
          <i class="fas fa-user-md"></i>
          <span class="label">Rawat Jalan</span>
          <span class="badge">Poli</span>
        </a>

        <a
          href="https://lab.cpdh.web.id"
          target="_blank"
          class="menu-item item-lab"
        >
          <i class="fas fa-flask"></i>
          <span class="label">Laboratorium</span>
          <span class="badge">Hasil Lab</span>
        </a>

        <a
          href="https://rawatinap.cpdh.web.id"
          target="_blank"
          class="menu-item item-rawat-inap"
        >
          <i class="fas fa-procedures"></i>
          <span class="label">Rawat Inap</span>
          <span class="badge">Kamar & Pasien</span>
        </a>

        <a
          href="https://farmasi.cpdh.web.id"
          target="_blank"
          class="menu-item item-farmasi"
        >
          <i class="fas fa-pills"></i>
          <span class="label">Farmasi</span>
          <span class="badge">Obat & Stok</span>
        </a>

        <a
          href="https://link-lain.com"
          target="_blank"
          class="menu-item full-width"
          style="
            background: rgba(79, 195, 247, 0.08);
            border-color: rgba(79, 195, 247, 0.2);
          "
        >
          <i class="fas fa-external-link-alt"></i>
          <span class="label">Aplikasi Lainnya</span>
        </a>
      </div>

      <!-- FOOTER dengan jam digital -->
      <div class="footer">
        <div class="info">
          <i class="fas fa-shield-alt"></i> Terenkripsi • Internal RS
        </div>
        <div class="jam-digital" id="jamDigital">--:--:--</div>
      </div>
    </div>

    <!-- JAVASCRIPT: JAM DIGITAL REAL-TIME -->
    <script>
      function updateJam() {
        const now = new Date();
        const jam = String(now.getHours()).padStart(2, "0");
        const menit = String(now.getMinutes()).padStart(2, "0");
        const detik = String(now.getSeconds()).padStart(2, "0");
        document.getElementById("jamDigital").textContent =
          jam + ":" + menit + ":" + detik;
      }
      updateJam();
      setInterval(updateJam, 1000);
    </script>
  </body>
</html>
